name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test
      - name: Typecheck relay
        run: pnpm exec tsc -p relay/tsconfig.json
